name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private URLs, JSON exports, or security vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: dropdown
    id: cors
    attributes:
      label: Does the public status page permit browser CORS requests?
      options: [Yes, No, Unknown]
    validations:
      required: true
  - type: checkboxes
    id: sensitive
    attributes:
      label: Sensitive data check
      options:
        - label: I removed credentials, private URLs, internal identifiers, and personal data.
          required: true
